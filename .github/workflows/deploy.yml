# =============================================================================
# Copy into your Admin-DressnMore repo as: .github/workflows/deploy.yml
#
# GitHub → Settings → Secrets and variables → Actions, add:
#   VPS_HOST      e.g. 203.0.113.50 or server1.example.com
#   VPS_USERNAME  e.g. root or deploy
#   VPS_SSH_KEY   private key (full PEM, including BEGIN/END lines)
# Optional:
#   VPS_PORT          SSH port (default 22)
#   VITE_BACKEND_URL  Central API origin + /v1 (see below)
#
# Server nginx must use:
#   root /var/www/Admin-DressnMore/out;
# (This project builds to `out/` — if you switch Vite to `dist/`, change paths below + nginx.)
#
# Central Laravel API (routes/api.php) is mounted at:
#   https://<TENANCY_CENTRAL_APP_DOMAIN>/v1
# Example: https://alhatoum.dressnmore.it.com/v1
# NOT .../api/v1 (that path is for tenant APIs on tenant hosts).
#
# The SSH user must mkdir, chown, nginx -t, systemctl reload nginx (root or sudo).
# =============================================================================

name: Deploy admin SPA to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL || 'https://alhatoum.dressnmore.it.com/v1' }}

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            mkdir -p /var/www/Admin-DressnMore/out
            rm -rf /var/www/Admin-DressnMore/out/*

      - name: Upload out to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "out/*"
          target: "/var/www/Admin-DressnMore/out"
          strip_components: 1
          rm: false

      - name: Permissions and reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            chown -R nginx:nginx /var/www/Admin-DressnMore
            find /var/www/Admin-DressnMore -type d -exec chmod 755 {} \;
            find /var/www/Admin-DressnMore -type f -exec chmod 644 {} \;
            nginx -t
            systemctl reload nginx
